# See https://wiki.hyprland.org/Configuring/Binds/
#!
# User
bind = Ctrl+Super, Slash, exec, xdg-open ~/.config/illogical-impulse/config.json # Edit shell config [hidden]
bind = Ctrl+Super+Alt, Slash, exec, xdg-open ~/.config/hypr/custom/keybinds.conf # Edit extra keybinds [hidden]

# Add stuff here
# Use #! to add an extra column on the cheatsheet
# Use ##! to add a section in that column
# Add a comment after a bind to add a description, like above

##! Custom/Override
# Q key
bind = Super+Shift, Q, exec, pkill -9 -f $(hyprctl activewindow -j | jq -r .class) # Kill program

# O Key
unbind = Super, O
bind = Super, O, exec, ~/.config/hypr/custom/scripts/vesktop_special.sh # [hidden]
bind = Super+Shift, O, exec, obsidian # [hidden]
#/# bind = Super+Ø/Shift, O,, # Vesktop/Obsidian

# W key
bind = Super+Shift, W, exec, firefox --private-window # [hidden]

# A key
unbind = Super, A
bind = Super, A, exec, ~/.config/hypr/custom/scripts/spotify_special.sh # Spotify

# X key
unbind = Super, X
bind = Super, X, exec, kitty nvim # [hidden]

# C key
unbind = Super, C
bind = Super, C, exec, papers # Document viewer

# U key
bind = Super, U, exec, kitty ~/.config/hypr/custom/scripts/printdotscommits.sh # [hidden]
bind = Super+Shift, U, exec, kitty ~/.config/hypr/custom/scripts/updatedots.sh # [hidden]
#/# bind = Super+Ø/Shift, U,, # dots-hyprland update

# Y key
bind = Super, Y, exec, kitty ~/.config/hypr/custom/scripts/archstatusprint.sh # [hidden]
bind = Super+Shift, Y, exec, kitty ~/.config/hypr/custom/scripts/updatesystem.sh # [hidden]
#/# bind = Super+Ø/Shift, Y,, # Full system update

# D key
bind = Super+Alt, D, exec, ~/.config/hypr/custom/scripts/toggledock.sh # Toggle dock

# P key
bind = Super+Alt, P, exec, ~/.config/hypr/custom/scripts/togglerefresh.sh # Change refresh rate

# H key
bind = Super+Alt, H, exec, ~/.config/hypr/custom/scripts/showdesktop.sh # Show desktop

# J key
unbind = Super, J
bind = Super, J, layoutmsg, togglesplit # [hidden]
bind = Super+Alt, J, global, quickshell:barToggle # Toggle bar

# K key
bind = Super+Alt, K, exec, ~/.config/hypr/custom/scripts/toggleclock.sh # Toggle clock

# L key
unbind = Super, L
bind = Super+Alt, L, exec, loginctl lock-session # [hidden]

# Return/backspace key
# bind = Super, Return, cyclenext # [hidden]
# bind = Super, backspace, cyclenext, prev # [hidden]
# #/# bind = Super, Enter/backspace,, # Window cycle
unbind = Ctrl+Shift, Escape
bind = Ctrl+Shift, Escape, exec, ~/.config/hypr/custom/scripts/btop_special.sh # [hidden]
bind = Ctrl+Alt, Backspace, global, quickshell:sessionToggle # [hidden]

# \ key
bind = Super, backslash, exec, ~/.config/hypr/custom/scripts/togglefcitx5.sh # [hidden]
#/# bind = Super, \,, # Toggle fcitx5
bind = Super+Alt, backslash, exec, kitty --class neo neo -m "Those who worship the terminal never fear the system. They are the system." --defaultbg --speed=12 --density=10 --lingerms=1,1 --rippct=0 # [hidden]
windowrule = match:class neo, fullscreen yes
bind = Super+Shift, backslash, exec, kitty --class unimatrix unimatrix # [hidden]
windowrule = match:class unimatrix, fullscreen yes
bind = Ctrl+Super, backslash, exec, kitty --class vis vis # [hidden]
windowrule = match:class vis, fullscreen yes
#/# bind = Super+Ctrl/Shift/Alt, \,, # Screensaver

# Space key
unbind = Super+Alt, Space
bind = Super+Alt, Space, exec, ~/.config/hypr/custom/scripts/togglefloating.sh # [hidden]

# Copilot key
input {
    kb_options = fkeys:basic_13-24
}
$Copilot = Super+Shift, F23
bind = $Copilot, exec, ~/.config/hypr/custom/scripts/togglelayout.sh # [hidden]
bind = Ctrl+$Copilot, exec, ~/.config/hypr/custom/scripts/togglelayout_tiled.sh # [hidden]
#/# bind = Ø/Ctrl, Copilot,, # !CYCLE LAYOUT

##! Scrolling layout
# Comma/Period
unbind = Super, Period
bind = Super, period, layoutmsg, focus right # [hidden]
bind = Super, comma,  layoutmsg, focus left # [hidden]
#/# bind = Super, cm/pr,, # Move view (centered)
bind = Super+Shift, period, layoutmsg, colresize +0.1 # [hidden]
bind = Super+Shift, comma, layoutmsg, colresize -0.1 # [hidden]
#/# bind = Super+Shift, cm/pr,, # Change size
bind = Super+Alt, period, layoutmsg, swapcol r # [hidden]
bind = Super+Alt, comma, layoutmsg, swapcol l # [hidden]
#/# bind = Super+Alt, cm/pr,, # Swap column

unbind = Super, Return
bind = Super, Return, layoutmsg, colresize +conf # Resize to halfscreen

## New config ##
# Mouse
unbind = Super, mouse_up
unbind = Super, mouse_down
bind = Super, mouse_up, layoutmsg, focus right # [hidden]
bind = Super, mouse_down, layoutmsg, focus left  # [hidden]
# #/# bind = Super, Scroll ↑/↓,, # Move view (centered)

unbind = Super+Shift, mouse_up
unbind = Super+Shift, mouse_down
bind = Super+Shift, mouse_up, workspace, r+1 # [hidden]
bind = Super+Shift, mouse_down, workspace, r-1 # [hidden]
# #/# bind = Super+Shift, Scroll ↑/↓,, # Change workspace

unbind = Super+Alt, mouse_up
unbind = Super+Alt, mouse_down
bind = Super+Alt, mouse_up, layoutmsg, swapcol l # [hidden]
bind = Super+Alt, mouse_down, layoutmsg, swapcol r # [hidden]
# #/# bind = Super+Alt, Scroll ↑/↓,, # Swap column

unbind = Ctrl+Super, mouse_up
unbind = Ctrl+Super, mouse_down
bind = Ctrl+Super, mouse_up, layoutmsg, colresize -0.1 # [hidden]
bind = Ctrl+Super, mouse_down, layoutmsg, colresize +0.1 # [hidden]
# #/# bind = Ctrl+Super, Scroll ↑/↓,, # Change size

##! Master layout
bind = Super, J, layoutmsg, swapwithmaster # [hidden]
#/# bind = Super, J,, # Swap master

bind = Super+Shift, J, layoutmsg, addmaster # [hidden]
bind = Super+Shift, K, layoutmsg, removemaster # [hidden]
#/# bind = Super+Shift, J/K,, # Add to/Remove from master

bind = Super, comma, layoutmsg, cycleprev noloop # [hidden]
bind = Super, period, layoutmsg, cyclenext noloop # [hidden]
#/# bind = Super, cm/pr,, # Cycle previous/next
bind = Super+Shift, comma, layoutmsg, swapprev noloop # [hidden]
bind = Super+Shift, period, layoutmsg, swapnext noloop # [hidden]
#/# bind = Super+Shift, cm/pr,, # Swap previous/next
bind = Super+Alt, comma, layoutmsg, rollnext # [hidden]
bind = Super+Alt, period, layoutmsg, rollprev # [hidden]
#/# bind = Super+Alt, cm/pr,, # Roll previous/next

bind = Super, Semicolon, layoutmsg, mfact -0.05 # [hidden]
bind = Super, Apostrophe, layoutmsg, mfact +0.05 # [hidden]

bind = Super, Space, layoutmsg, orientationcycle # Cycle orientations

# Monocle layout
bind = Alt, Tab, layoutmsg, cyclenext # [hidden]
